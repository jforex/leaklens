<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LeakLens</title>
<style>
  :root{
    --font-ui:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --font-mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
    --bg:#f5f6f8; --panel:#ffffff; --line:#e5e8ec; --ink:#1a2230; --muted:#6b7785;
    --accent:#2563eb; --accent-hover:#1d4ed8; --accent-tint:#eff6ff; --accent-tint-line:#bfdbfe;
    --high:#dc2626; --high-tint:#fef2f2; --high-tint-line:#fecaca;
    --med:#d97706; --med-tint:#fffbeb; --med-tint-line:#fde68a;
    --low:#0891b2; --low-tint:#ecfeff; --low-tint-line:#a5f3fc;
    --shadow:0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.04);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  ::selection{background:var(--accent);color:#ffffff;}
  body{background:var(--bg);color:var(--ink);font-family:var(--font-ui);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;}
  main::-webkit-scrollbar{width:10px;}
  main::-webkit-scrollbar-track{background:transparent;}
  main::-webkit-scrollbar-thumb{background:#d3d8de;border-radius:6px;border:2px solid var(--bg);}
  main::-webkit-scrollbar-thumb:hover{background:#b7bec7;}
  .app{display:flex;flex-direction:column;height:100vh;}
  header{background:var(--panel);padding:22px 28px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
  .brand{font-size:22px;font-weight:700;letter-spacing:-0.5px;}
  .brand span{color:var(--accent);}
  .tagline{font-size:11px;color:var(--muted);letter-spacing:1.4px;text-transform:uppercase;margin-top:4px;}
  .badge{font-size:11px;font-weight:500;color:var(--accent);background:var(--accent-tint);border:1px solid var(--accent-tint-line);border-radius:20px;padding:6px 14px;letter-spacing:.3px;}
  .toolbar{background:var(--panel);padding:14px 28px;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .toolbar .group{display:flex;gap:8px;align-items:center;}
  .toolbar .divider{width:1px;height:22px;background:var(--line);margin:0 6px;}
  button{font-family:inherit;font-size:13px;font-weight:500;background:var(--panel);color:var(--ink);border:1px solid var(--line);padding:9px 16px;border-radius:6px;cursor:pointer;transition:border-color .15s ease,color .15s ease,background-color .15s ease;}
  button:hover:not(:disabled){border-color:var(--accent);color:var(--accent);background:var(--accent-tint);}
  button:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  button:disabled{opacity:.45;cursor:not-allowed;}
  button.primary{background:var(--accent);color:#ffffff;border-color:var(--accent);font-weight:600;}
  button.primary:hover:not(:disabled){background:var(--accent-hover);border-color:var(--accent-hover);color:#ffffff;}
  .filechip{font-size:11px;color:var(--muted);}
  .filechip b{color:var(--accent);font-weight:600;}
  .status{margin-left:auto;font-size:11px;color:var(--muted);}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);margin-right:6px;animation:pulse 1.4s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  main{flex:1;overflow-y:auto;padding:28px;background:var(--bg);}
  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);text-align:center;gap:10px;}
  .empty h2{font-size:19px;color:var(--ink);font-weight:600;}
  .empty div{max-width:420px;line-height:1.6;}
  .summary{display:flex;gap:16px;margin-bottom:26px;}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px 20px;flex:1;box-shadow:var(--shadow);}
  .stat .n{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;}
  .stat .l{font-size:10px;color:var(--muted);letter-spacing:1.3px;text-transform:uppercase;margin-top:4px;}
  .stat.high .n{color:var(--high);} .stat.med .n{color:var(--med);} .stat.total .n{color:var(--accent);}
  .finding{background:var(--panel);border:1px solid var(--line);border-left-width:3px;border-radius:10px;padding:18px 20px;margin-bottom:14px;box-shadow:var(--shadow);animation:rise .3s ease both;}
  .finding.high{border-left-color:var(--high);} .finding.medium{border-left-color:var(--med);} .finding.low{border-left-color:var(--low);}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .fhead{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
  .sev{font-size:9px;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:4px;text-transform:uppercase;border:1px solid transparent;}
  .sev.high{background:var(--high-tint);color:var(--high);border-color:var(--high-tint-line);}
  .sev.medium{background:var(--med-tint);color:var(--med);border-color:var(--med-tint-line);}
  .sev.low{background:var(--low-tint);color:var(--low);border-color:var(--low-tint-line);}
  .ftype{font-weight:600;font-size:14px;}
  .fdetail{font-size:12px;color:var(--muted);line-height:1.6;}
  .fai{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line);font-size:13px;line-height:1.55;color:var(--ink);}
  .fai .lbl{font-size:9px;color:var(--accent);letter-spacing:1.4px;text-transform:uppercase;display:block;margin-bottom:5px;}
  .fai.loading{color:var(--muted);font-style:italic;}
  .askbar{position:sticky;bottom:0;background:var(--bg);border-top:1px solid var(--line);padding:20px 0 6px;margin-top:28px;}
  .askbar .row{display:flex;gap:10px;}
  .askbar input{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--ink);font-family:inherit;font-size:14px;padding:12px 16px;border-radius:8px;transition:border-color .15s ease,box-shadow .15s ease;}
  .askbar input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.15);}
  .askbar input::placeholder{color:var(--muted);}
  .answer{margin-top:14px;padding:16px 18px;background:var(--panel);border:1px solid var(--line);border-radius:8px;font-size:14px;line-height:1.6;box-shadow:var(--shadow);display:none;}
  .answer .lbl{font-size:9px;color:var(--accent);letter-spacing:1.4px;text-transform:uppercase;display:block;margin-bottom:6px;}
  .bd{width:100%;border-collapse:collapse;margin:10px 0 4px;font-family:var(--font-mono);font-size:12px;}
  .bd tr:last-child td{border-bottom:none;}
  .bd td{padding:8px 10px;border-bottom:1px solid var(--line);}
  .bd td:first-child{color:var(--muted);}
  .bd td:last-child{text-align:right;color:var(--ink);font-weight:500;}
  .bd tr.leak td:last-child{color:var(--high);}
  .bd tr.leak td:first-child{color:var(--high);}
  .bd-title{font-size:14px;font-weight:600;margin-bottom:3px;}
  .askbar .hint{font-size:11px;color:var(--muted);margin-top:10px;line-height:1.5;}
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <div class="brand">Leak<span>Lens</span></div>
      <div class="tagline">Local-first truth layer for business records</div>
    </div>
    <div class="badge">100% on-device</div>
  </header>
  <div class="toolbar">
    <button id="initBtn" class="primary">Initialise</button>
    <span class="divider"></span>
    <div class="group">
      <button id="expBtn" disabled>Expenses CSV</button>
      <button id="invBtn" disabled>Inventory CSV</button>
      <button id="purBtn" disabled>Purchases CSV</button>
      <button id="salBtn" disabled>Sales CSV</button>
      <button id="sampleBtn" disabled>Use sample data</button>
    </div>
    <span class="divider"></span>
    <button id="runBtn" disabled class="primary">Analyze</button>
    <span class="filechip" id="files"></span>
    <span class="status" id="status">idle</span>
  </div>
  <main>
    <div class="empty" id="empty">
      <h2>No analysis yet</h2>
      <div>Initialise the local AI, load your CSV data (or use samples), then Analyze.</div>
    </div>
    <div id="results" style="display:none;">
      <div class="summary" id="summary"></div>
      <div id="list"></div>
      <div class="askbar">
        <div class="row">
          <input id="qInput" placeholder="Ask your data:  what's our best-selling product?  which item didn't sell?  total expenses?" />
          <button id="askBtn" class="primary">Ask</button>
          <button id="stopBtn" style="display:none;">Stop</button>
        </div>
        <div class="answer" id="answer"></div>
        <div class="hint">Answers are computed from your data and phrased by the local AI. Nothing leaves your device.</div>
      </div>
    </div>
  </main>
</div>
<script>
  const $ = id => document.getElementById(id);
  const initBtn=$('initBtn'),expBtn=$('expBtn'),invBtn=$('invBtn'),sampleBtn=$('sampleBtn'),runBtn=$('runBtn');
  const purBtn=$('purBtn'),salBtn=$('salBtn');
  const qInput=$('qInput'),askBtn=$('askBtn'),answer=$('answer'),stopBtn=$('stopBtn');
  const statusEl=$('status'),filesEl=$('files'),empty=$('empty'),results=$('results'),summary=$('summary'),list=$('list');
  let paths={expensesPath:null,inventoryPath:null,purchasesPath:null,salesPath:null};

  window.leaklens.onStatus(s=>statusEl.textContent=s);

  function refreshFiles(){
    const parts=[];
    if(paths.expensesPath)parts.push('exp:<b>'+paths.expensesPath.split('/').pop()+'</b>');
    if(paths.inventoryPath)parts.push('inv:<b>'+paths.inventoryPath.split('/').pop()+'</b>');
    if(paths.purchasesPath)parts.push('pur:<b>'+paths.purchasesPath.split('/').pop()+'</b>');
    if(paths.salesPath)parts.push('sal:<b>'+paths.salesPath.split('/').pop()+'</b>');
    filesEl.innerHTML=parts.join('  ');
    runBtn.disabled=!(paths.expensesPath||paths.inventoryPath);
  }

  initBtn.onclick=async()=>{
    initBtn.disabled=true;statusEl.innerHTML='<span class="dot"></span>loading local AI…';
    await window.leaklens.init();
    expBtn.disabled=false;invBtn.disabled=false;purBtn.disabled=false;salBtn.disabled=false;sampleBtn.disabled=false;
    initBtn.textContent='Ready';
  };
  expBtn.onclick=async()=>{const p=await window.leaklens.pickFile('expenses');if(p){paths.expensesPath=p;refreshFiles();}};
  invBtn.onclick=async()=>{const p=await window.leaklens.pickFile('inventory');if(p){paths.inventoryPath=p;refreshFiles();}};
  purBtn.onclick=async()=>{const p=await window.leaklens.pickFile('purchases');if(p){paths.purchasesPath=p;refreshFiles();}};
  salBtn.onclick=async()=>{const p=await window.leaklens.pickFile('sales');if(p){paths.salesPath=p;refreshFiles();}};
  sampleBtn.onclick=async()=>{paths=await window.leaklens.useSamples();refreshFiles();statusEl.textContent='sample data loaded';};

  runBtn.onclick=async()=>{
    runBtn.disabled=true;statusEl.innerHTML='<span class="dot"></span>detecting anomalies…';
    const findings=await window.leaklens.analyze(paths);
    empty.style.display='none';results.style.display='block';

    const high=findings.filter(f=>f.severity==='high').length;
    const med=findings.filter(f=>f.severity==='medium').length;
    summary.innerHTML=
      '<div class="stat total"><div class="n">'+findings.length+'</div><div class="l">Total Findings</div></div>'+
      '<div class="stat high"><div class="n">'+high+'</div><div class="l">High Severity</div></div>'+
      '<div class="stat med"><div class="n">'+med+'</div><div class="l">Medium / Low</div></div>';

    list.innerHTML='';
    findings.forEach((f,i)=>{
      const el=document.createElement('div');el.className='finding '+f.severity;
      el.innerHTML='<div class="fhead"><span class="sev '+f.severity+'">'+f.severity+'</span><span class="ftype">'+f.type+'</span></div>'+
                   '<div class="fdetail">'+f.detail+'</div>'+
                   '<div class="fai loading" id="ai'+i+'"><span class="lbl">AI Analysis</span>analysing…</div>';
      list.appendChild(el);
    });

    statusEl.innerHTML='<span class="dot"></span>AI explaining findings…';
    for(let i=0;i<findings.length;i++){
      const ex=await window.leaklens.explain(findings[i]);
      const box=$('ai'+i);box.classList.remove('loading');
      box.innerHTML='<span class="lbl">AI Analysis · local</span>'+ex;
    }
    statusEl.textContent='analysis complete · '+findings.length+' findings · 100% local';
    runBtn.disabled=false;
  };

  let askToken=0;
  function stopAsk(){
    askToken++;            // invalidate any in-flight answer
    askBtn.style.display='';stopBtn.style.display='none';askBtn.disabled=false;
    answer.innerHTML='<span class="lbl">Answer</span><span style="color:var(--muted)">Stopped. Ask again.</span>';
  }
  stopBtn.onclick=stopAsk;

  async function doAsk(){
    const q=qInput.value.trim();if(!q)return;
    const myToken=++askToken;
    askBtn.style.display='none';stopBtn.style.display='';
    answer.style.display='block';answer.innerHTML='<span class="lbl">Answer</span>thinking locally…';
    const res=await window.leaklens.askData(q,paths);
    if(myToken!==askToken)return;   // a stop or newer question happened; ignore this result
    askBtn.style.display='';stopBtn.style.display='none';
    let html='<span class="lbl">Answer · local AI</span>';
    if(res.breakdown){
      const b=res.breakdown;
      html+='<div class="bd-title">'+b.item+'</div>';
      html+='<table class="bd">';
      for(const [label,val] of b.rows){
        const isLeak=label.toLowerCase().includes('leak')&&b.leak!==0;
        html+='<tr'+(isLeak?' class="leak"':'')+'><td>'+label+'</td><td>'+val+'</td></tr>';
      }
      html+='</table>';
      html+='<div style="margin-top:8px;">'+res.text+'</div>';
    } else {
      html+=res.text;
    }
    answer.innerHTML=html;
  }
  askBtn.onclick=doAsk;
  qInput.addEventListener('keydown',e=>{if(e.key==='Enter')doAsk();});
</script>
</body>
</html>
